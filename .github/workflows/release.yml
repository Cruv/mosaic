name: Release

# Cut a GitHub Release for every v* tag. Notes = the matching CHANGELOG.md
# section (if present) followed by GitHub's auto-generated "What's Changed".
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so auto-notes can diff against the previous tag

      - name: Build release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([^0-9]|$)" { f=1; next }
            f && /^## / { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then printf "Release %s.\n" "$TAG" > RELEASE_NOTES.md; fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true # appends "What's Changed"
          prerelease: ${{ contains(github.ref_name, '-') }}
